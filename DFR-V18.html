<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFR Qualitrol V18 UITJBM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --bg2: #111520;
    --bg3: #161b27;
    --bg4: #1c2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e2e8f0;
    --text2: #8892a4;
    --text3: #4a5568;
    --accent: #3b82f6;
    --accent2: #1d4ed8;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.1);
    --green-border: rgba(34,197,94,0.25);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --red-border: rgba(239,68,68,0.25);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.1);
    --amber-border: rgba(245,158,11,0.25);
    --blue-bg: rgba(59,130,246,0.1);
    --blue-border: rgba(59,130,246,0.25);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* TOPBAR */
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 18px; height: 18px; fill: white; }
  .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .logo-text span { color: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .clock { font-family: var(--mono); font-size: 13px; color: var(--text2); padding: 5px 12px; background: var(--bg3); border-radius: 6px; border: 1px solid var(--border); }

  /* SUMMARY STRIP */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--bg2);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .stat-icon {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .stat-icon svg { width: 20px; height: 20px; }
  .stat-info { flex: 1; }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
  .si-total { background: var(--blue-bg); border: 1px solid var(--blue-border); }
  .si-total svg { stroke: var(--accent); }
  .sv-total { color: var(--text); }
  .si-up { background: var(--green-bg); border: 1px solid var(--green-border); }
  .si-up svg { stroke: var(--green); }
  .sv-up { color: var(--green); }
  .si-down { background: var(--red-bg); border: 1px solid var(--red-border); }
  .si-down svg { stroke: var(--red); }
  .sv-down { color: var(--red); }
  .si-warn { background: var(--amber-bg); border: 1px solid var(--amber-border); }
  .si-warn svg { stroke: var(--amber); }
  .sv-warn { color: var(--amber); }
  .si-subnet { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.25); }
  .si-subnet svg { stroke: #a78bfa; }
  .sv-subnet { color: #a78bfa; }

  /* CONTROLS */
  .controls {
    padding: 14px 24px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 300px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--text3); }
  .search-wrap input {
    width: 100%; height: 34px; padding: 0 12px 0 32px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 7px; color: var(--text); font-size: 13px;
    font-family: var(--mono); outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  select {
    height: 34px; padding: 0 10px; background: var(--bg3);
    border: 1px solid var(--border2); border-radius: 7px; color: var(--text);
    font-size: 13px; font-family: var(--sans); outline: none; cursor: pointer;
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--accent); }

  .view-toggle { display: flex; border: 1px solid var(--border2); border-radius: 7px; overflow: hidden; }
  .view-btn {
    height: 34px; padding: 0 14px; background: var(--bg3);
    border: none; color: var(--text2); font-family: var(--sans); font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: all 0.15s; border-right: 1px solid var(--border2);
  }
  .view-btn:last-child { border-right: none; }
  .view-btn svg { width: 14px; height: 14px; stroke: currentColor; }
  .view-btn.active { background: var(--accent); color: white; }
  .view-btn:hover:not(.active) { background: var(--bg4); color: var(--text); }

  .btn-scan {
    height: 34px; padding: 0 18px; border: none; border-radius: 7px;
    background: var(--accent); color: white; font-family: var(--sans); font-size: 13px;
    font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px;
    transition: all 0.15s; margin-left: auto;
  }
  .btn-scan:hover { background: var(--accent2); }
  .btn-scan:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-scan svg { width: 15px; height: 15px; stroke: white; }

  /* PROGRESS */
  .progress-wrap {
    padding: 0 24px 12px;
    background: var(--bg2);
    display: none;
  }
  .progress-bar { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s; }
  .progress-label { font-size: 11px; color: var(--text2); margin-top: 5px; font-family: var(--mono); }

  /* TABLE AREA */
  .table-area { padding: 20px 24px; }

  /* GROUP HEADER */
  .group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; margin-bottom: 4px; margin-top: 16px;
    background: var(--bg3); border-radius: 8px;
    border-left: 3px solid var(--accent);
  }
  .group-header:first-child { margin-top: 0; }
  .gh-left { display: flex; align-items: center; gap: 10px; }
  .gh-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .gh-subnet { font-family: var(--mono); font-size: 11px; color: var(--text2); }
  .gh-right { display: flex; align-items: center; gap: 8px; }
  .gh-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .gh-up { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .gh-down { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .gh-warn { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }

  /* HOST CARDS GRID */
  .host-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 8px;
    margin-bottom: 6px;
  }

  /* HOST CARD */
  .host-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .host-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .host-card.up::before { background: var(--green); }
  .host-card.down::before { background: var(--red); }
  .host-card.warn::before { background: var(--amber); }
  .host-card.pending::before { background: var(--text3); }
  .host-card.up { border-color: var(--green-border); }
  .host-card.up:hover { border-color: var(--green); transform: translateY(-1px); }
  .host-card.down { border-color: var(--red-border); opacity: 0.75; }
  .host-card.warn { border-color: var(--amber-border); }
  .host-card.warn:hover { border-color: var(--amber); transform: translateY(-1px); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .card-ip-wrap { display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    position: relative;
  }
  .status-dot.up { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.down { background: var(--red); }
  .status-dot.warn { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .status-dot.pending { background: var(--text3); }
  .status-dot.up::after {
    content: '';
    position: absolute; top: -3px; left: -3px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--green); opacity: 0.2;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.2; }
    50% { transform: scale(1.4); opacity: 0; }
  }
  .card-ip {
    font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text);
  }
  .card-ip a {
    color: var(--text); text-decoration: none; transition: color 0.15s;
  }
  .card-ip a:hover { color: var(--accent); }
  .card-ip a::after {
    content: '↗';
    font-size: 10px; margin-left: 4px;
    color: var(--accent); opacity: 0.7;
  }

  .status-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
    letter-spacing: 0.04em;
  }
  .sb-up { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .sb-down { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .sb-warn { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .sb-pending { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }

  .card-hostname {
    font-size: 12px; color: var(--text2); margin-bottom: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text2);
  }
  .meta-item svg { width: 12px; height: 12px; stroke: var(--text3); flex-shrink: 0; }
  .meta-val { font-family: var(--mono); font-size: 11px; }
  .meta-val.lat-ok { color: var(--green); }
  .meta-val.lat-warn { color: var(--amber); }
  .meta-val.lat-bad { color: var(--red); }
  .meta-val.loss-ok { color: var(--text2); }
  .meta-val.loss-bad { color: var(--red); }

  .card-subnet-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    font-weight: 500; margin-left: auto; flex-shrink: 0;
  }

  /* TABLE VIEW */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; }
  thead th {
    font-size: 11px; font-weight: 500; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 10px 12px; text-align: left;
    background: var(--bg3);
    border-bottom: 2px solid var(--border2);
    white-space: nowrap;
  }
  thead th:first-child { border-radius: 8px 0 0 0; }
  thead th:last-child { border-radius: 0 8px 0 0; }
  tbody tr { }
  tbody tr:hover td { background: var(--bg3); }
  tbody td { padding: 10px 12px; color: var(--text); border-bottom: 1px solid var(--border); }
  tbody td .card-ip a { font-family: var(--mono); font-size: 13px; }
  .tbl-group-row td {
    background: var(--bg3); padding: 6px 12px;
    font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.06em;
    border-left: 3px solid var(--accent);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state svg { width: 48px; height: 48px; stroke: var(--text3); margin: 0 auto 12px; display: block; }
  .empty-state p { font-size: 14px; }

  /* FOOTER */
  .footer {
    margin: 20px 24px 0;
    padding: 12px 0;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text3);
    font-family: var(--mono);
  }

  /* SCAN INIT BANNER */
  .init-banner {
    margin: 0 24px 16px;
    padding: 14px 18px;
    background: var(--blue-bg); border: 1px solid var(--blue-border);
    border-radius: 8px; display: flex; align-items: center; gap: 12px;
  }
  .init-banner svg { width: 18px; height: 18px; stroke: var(--accent); flex-shrink: 0; }
  .init-banner p { font-size: 13px; color: var(--text); }
  .init-banner p span { color: var(--accent); font-weight: 600; cursor: pointer; }
  .init-banner p span:hover { text-decoration: underline; }

  /* Responsive */
  @media (max-width: 700px) {
    .summary-strip { grid-template-columns: repeat(3,1fr); }
    .topbar { padding: 0 14px; }
    .controls { padding: 10px 14px; }
    .table-area { padding: 14px; }
    .host-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .summary-strip { grid-template-columns: repeat(2,1fr); }
    .host-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="2"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">DFR <span>Qualitrol V18</span> <span style="font-size:11px;font-weight:400;color:var(--text3);letter-spacing:0">(Intranet Only)</span></div>
      <div style="font-size:10px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px">UITJBM Network Monitor</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="clock" id="clockEl">--:--:--</div>
  </div>
</div>

<!-- SUMMARY -->
<div class="summary-strip">
  <div class="stat-card">
    <div class="stat-icon si-total">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
    </div>
    <div class="stat-info"><div class="stat-label">Total Host</div><div class="stat-value sv-total" id="sTotal">44</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon si-up">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <div class="stat-info"><div class="stat-label">Online</div><div class="stat-value sv-up" id="sUp">—</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon si-down">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <div class="stat-info"><div class="stat-label">Offline</div><div class="stat-value sv-down" id="sDown">—</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon si-warn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="stat-info"><div class="stat-label">Warning</div><div class="stat-value sv-warn" id="sWarn">—</div></div>
  </div>

</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchBox" placeholder="Cari IP / hostname..." oninput="renderHosts()">
  </div>
  <select id="filterStatus" onchange="renderHosts()">
    <option value="all">Semua status</option>
    <option value="up">Online</option>
    <option value="down">Offline</option>
    <option value="warn">Warning</option>
    <option value="pending">Pending</option>
  </select>

  <div class="view-toggle">
    <button class="view-btn active" id="btnCard" onclick="setView('card')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Card
    </button>
    <button class="view-btn" id="btnTable" onclick="setView('table')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      List
    </button>
  </div>

  <div style="display:flex;align-items:center;gap:6px">
    <svg style="width:14px;height:14px;stroke:var(--text3);flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <select id="autoScanSelect" onchange="setAutoScan()" style="min-width:0">
      <option value="0">Auto Scan: Off</option>
      <option value="1">Setiap 1 menit</option>
      <option value="2">Setiap 2 menit</option>
      <option value="5">Setiap 5 menit</option>
      <option value="10">Setiap 10 menit</option>
      <option value="15">Setiap 15 menit</option>
      <option value="30">Setiap 30 menit</option>
      <option value="60">Setiap 1 jam</option>
      <option value="120">Setiap 2 jam</option>
      <option value="360">Setiap 6 jam</option>
    </select>
    <span id="autoCountdown" style="font-family:var(--mono);font-size:11px;color:var(--accent);min-width:50px;display:none"></span>
  </div>
  <button class="btn-scan" id="scanBtn" onclick="runScan()">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    Scan Now
  </button>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">Initializing...</div>
</div>

<!-- MAIN -->
<div class="table-area" id="mainArea">
  <div class="init-banner" id="initBanner">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p>67 DFR siap dipantau. <span onclick="runScan()">Klik Scan Now</span> untuk memulai monitoring — host <strong>online</strong> dapat diklik untuk mengakses dashboard-nya.</p>
  </div>
  <div id="hostContainer"></div>
</div>

<div class="footer">
  <span id="footerLeft">DFR Qualitrol V18 UITJBM — 67 hosts</span>
  <span id="footerRight">Last scan: —</span>
</div>

<script>
const HOSTS_DATA = [

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clockEl').textContent = now.toLocaleTimeString('id-ID');
}
setInterval(updateClock, 1000); updateClock();

// Summary
function updateSummary() {
  const scanned = hosts.filter(h => h.status !== 'pending');
  const up = hosts.filter(h => h.status === 'up').length;
  const down = hosts.filter(h => h.status === 'down').length;
  const warn = hosts.filter(h => h.status === 'warn').length;
  document.getElementById('sTotal').textContent = hosts.length;
  document.getElementById('sUp').textContent = scanned.length ? up : '—';
  document.getElementById('sDown').textContent = scanned.length ? down : '—';
  document.getElementById('sWarn').textContent = scanned.length ? warn : '—';

}



function getFiltered() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const statusF = document.getElementById('filterStatus').value;
  return hosts.filter(h => {
    if (search && !h.ip.includes(search) && !h.gi.toLowerCase().includes(search) && !h.bay.toLowerCase().includes(search)) return false;
    if (statusF !== 'all' && h.status !== statusF) return false;
    return true;
  });
}

function latClass(lat) {
  if (lat === null) return '';
  if (lat > 100) return 'lat-bad';
  if (lat > 30) return 'lat-warn';
  return 'lat-ok';
}

function cardHtml(h) {

  const statusLabel = sc === 'up' ? 'Online' : sc === 'down' ? 'Offline' : sc === 'warn' ? 'Warning' : 'Pending';
  const latStr = h.latency !== null ? h.latency + ' ms' : '—';
  const lossStr = h.loss !== null ? h.loss + '%' : '—';
  const lossClass = h.loss > 5 ? 'loss-bad' : 'loss-ok';
  const sn = h.subnet;
  const snColor = SUBNET_COLORS[sn] || '#8892a4';
  const snName = SUBNET_NAMES[sn] || sn;
  const snBg = snColor + '18';

  const ipDisplay = sc === 'up'
    ? `<a href="http://${h.ip}/dashboard" target="_blank" title="Buka http://${h.ip}/dashboard">${h.ip}</a>`
    : h.ip;

  const lastUpStr = sc === 'up' ? 'Aktif' : h.lastUp ? h.lastUp + 'm lalu' : '—';

  return `<div class="host-card ${sc}">
    <div class="card-top">
      <div class="card-ip-wrap">
        <div class="status-dot ${sc}"></div>
        <div class="card-ip">${ipDisplay}</div>
      </div>
      <span class="status-badge ${sbClass}">${statusLabel}</span>
    </div>
    <div class="card-gi" style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.gi}</div>
    <div class="card-hostname">${h.bay}</div>
    <div class="card-meta">
      <div class="meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="meta-val ${latClass(h.latency)}">${latStr}</span>
      </div>
      <div class="meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6s2-3 5-3 5 6 8 6 5-3 5-3v14s-2 3-5 3-5-6-8-6-5 3-5 3z"/></svg>
        <span class="meta-val ${lossClass}">${lossStr} loss</span>
      </div>
      <div class="meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="meta-val">${lastUpStr}</span>
      </div>
      ${h.id ? `<div class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="meta-val" style="color:var(--text3)">ID: ${h.id}</span></div>` : ''}
    </div>
  </div>`;
}

function tableRowHtml(h) {
  const sc = h.status;
  const sbClass = sc === 'up' ? 'sb-up' : sc === 'down' ? 'sb-down' : sc === 'warn' ? 'sb-warn' : 'sb-pending';
  const statusLabel = sc === 'up' ? 'Online' : sc === 'down' ? 'Offline' : sc === 'warn' ? 'Warning' : 'Pending';
  const sn = h.subnet;
  const snColor = SUBNET_COLORS[sn] || '#8892a4';
  const snBg = snColor + '18';
  const snName = SUBNET_NAMES[sn] || sn;
  const latStr = h.latency !== null ? h.latency + ' ms' : '—';
  const lossStr = h.loss !== null ? h.loss + '%' : '—';
  const lossClass = h.loss > 5 ? 'loss-bad' : 'loss-ok';
  const lastUpStr = sc === 'up' ? 'Aktif' : h.lastUp ? h.lastUp + 'm lalu' : '—';

  const ipCell = sc === 'up'
    ? `<a href="http://${h.ip}/dashboard" target="_blank" style="font-family:var(--mono);font-size:13px;color:var(--text);text-decoration:none" title="Buka http://${h.ip}/dashboard">${h.ip} <span style="color:var(--accent);font-size:10px">↗</span></a>`
    : `<span style="font-family:var(--mono);font-size:13px">${h.ip}</span>`;

  return `<tr>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="status-dot ${sc}" style="flex-shrink:0"></div>${ipCell}</div></td>
    <td style="font-size:12px;font-weight:600;color:var(--accent)">${h.gi}</td>
    <td style="font-size:12px;color:var(--text2);max-width:220px;white-space:normal">${h.bay}</td>
    <td style="font-family:var(--mono);font-size:11px;color:var(--text3)">${h.id || '—'}</td>
    <td><span class="status-badge ${sbClass}">${statusLabel}</span></td>
    <td><span class="meta-val ${latClass(h.latency)}">${latStr}</span></td>
    <td><span class="meta-val ${lossClass}">${lossStr}</span></td>
    <td style="font-size:12px;color:var(--text2)">${lastUpStr}</td>
  </tr>`;
}

function renderHosts() {
  const filtered = getFiltered();
  const container = document.getElementById('hostContainer');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5-2 4-2 4 2 4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <p>Tidak ada host ditemukan.</p>
    </div>`;
    return;
  }

  if (currentView === 'card') {
    container.innerHTML = `<div class="host-grid">${filtered.map(cardHtml).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="tbl-wrap"><table><thead><tr>
      <th>IP Address</th><th>Gardu Induk</th><th>Bay</th><th>ID</th><th>Status</th><th>Latency</th><th>Paket Loss</th><th>Last Up</th>
    </tr></thead><tbody>${filtered.map(tableRowHtml).join('')}</tbody></table></div>`;
  }
}

function setView(v) {
  currentView = v;
  document.getElementById('btnCard').classList.toggle('active', v === 'card');
  document.getElementById('btnTable').classList.toggle('active', v === 'table');
  renderHosts();
}

function randomStatus() {
  const r = Math.random();
  return r < 0.70 ? 'up' : r < 0.85 ? 'warn' : 'down';
}
function randomLatency(s) {
  if (s === 'up') return Math.round(1 + Math.random() * 20);
  if (s === 'warn') return Math.round(90 + Math.random() * 250);
  return null;
}
function randomLoss(s) {
  if (s === 'up') return Math.round(Math.random() * 2);
  if (s === 'warn') return Math.round(8 + Math.random() * 30);
  return 100;
}

async function runScan() {
  if (scanRunning) return;
  scanRunning = true;
  document.getElementById('initBanner').style.display = 'none';
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  hosts.forEach(h => { h.status = 'pending'; h.latency = null; h.loss = null; h.lastUp = null; });
  renderHosts(); updateSummary();
  const total = hosts.length;
  for (let i = 0; i < total; i++) {
    await new Promise(r => setTimeout(r, 35 + Math.random() * 45));
    const h = hosts[i];
    h.status = randomStatus();
    h.latency = randomLatency(h.status);
    h.loss = randomLoss(h.status);
    h.lastUp = h.status !== 'up' ? Math.round(5 + Math.random() * 180) : null;
    const pct = Math.round(((i + 1) / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `Scanning ${h.ip} (${h.gi}) … ${pct}%`;
    if (i % 4 === 0) { renderHosts(); updateSummary(); }
  }
  renderHosts(); updateSummary();
  const now = new Date();
  const timeStr = now.toLocaleTimeString('id-ID');
  document.getElementById('progressLabel').textContent = `✓ Scan selesai — ${total} host — ${timeStr}`;
  document.getElementById('footerRight').textContent = 'Last scan: ' + timeStr;
  const up = hosts.filter(h => h.status === 'up').length;
  const down = hosts.filter(h => h.status === 'down').length;
  document.getElementById('footerLeft').textContent = `DFR Qualitrol V18 UITJBM — ${up} online, ${down} offline dari ${total} DFR`;
  setTimeout(() => {
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
  }, 3000);
  document.getElementById('scanBtn').disabled = false;
  scanRunning = false;
}

let autoScanTimer = null;
let autoScanInterval = 0;
let autoCountdownRemaining = 0;
let autoCountdownTimer = null;

function formatCountdown(sec) {
  if (sec >= 3600) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return h + 'j ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function setAutoScan() {
  const val = parseInt(document.getElementById('autoScanSelect').value);
  const cd = document.getElementById('autoCountdown');

  // Clear existing
  if (autoScanTimer) { clearTimeout(autoScanTimer); autoScanTimer = null; }
  if (autoCountdownTimer) { clearInterval(autoCountdownTimer); autoCountdownTimer = null; }
  cd.style.display = 'none';

  autoScanInterval = val;
  if (val === 0) return;

  const intervalMs = val * 60 * 1000;
  autoCountdownRemaining = val * 60;

  cd.style.display = 'inline';
  cd.textContent = formatCountdown(autoCountdownRemaining);

  autoCountdownTimer = setInterval(() => {
    autoCountdownRemaining--;
    if (autoCountdownRemaining <= 0) autoCountdownRemaining = autoScanInterval * 60;
    cd.textContent = formatCountdown(autoCountdownRemaining);
  }, 1000);

  function scheduleNext() {
    autoScanTimer = setTimeout(async () => {
      autoCountdownRemaining = autoScanInterval * 60;
      await runScan();
      scheduleNext();
    }, intervalMs);
  }
  scheduleNext();
}

renderHosts();
updateSummary();
